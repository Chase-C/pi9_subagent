name: Publish to npm

# Publishes the package whenever a GitHub Release is published.
# Auth uses npm Trusted Publishing (OIDC) — no npm token is stored in this repo.
# One-time setup on npmjs.com: add this repo + workflow as a trusted publisher
# for @pi9/subagent (the package must exist first; do one manual `npm publish`).

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for OIDC Trusted Publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted Publishing requires npm 11.5.1+; Node 22 ships an older npm.
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      # The release tag must match the version in package.json so they can't drift.
      # Supports tags written as either "0.1.0" or "v0.1.0".
      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Release tag ($TAG) does not match package.json version ($PKG)."
            exit 1
          fi
          echo "Publishing $PKG"

      # No NODE_AUTH_TOKEN: OIDC handles auth and attaches provenance automatically.
      # `prepublishOnly` runs typecheck + tests before the package is uploaded.
      - name: Publish
        run: npm publish
