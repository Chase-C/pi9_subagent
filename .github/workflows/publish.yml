name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Update npm
        run: npm install -g npm@11

      - name: Select package from release tag
        id: package
        shell: bash
        run: |
          case "$GITHUB_REF_NAME" in
            context-v*)
              echo "workspace=@pi9/context" >> "$GITHUB_OUTPUT"
              echo "path=packages/context" >> "$GITHUB_OUTPUT"
              echo "version=${GITHUB_REF_NAME#context-v}" >> "$GITHUB_OUTPUT"
              ;;
            subagent-v*)
              echo "workspace=@pi9/subagent" >> "$GITHUB_OUTPUT"
              echo "path=packages/subagent" >> "$GITHUB_OUTPUT"
              echo "version=${GITHUB_REF_NAME#subagent-v}" >> "$GITHUB_OUTPUT"
              ;;
            whisper-v*)
              echo "workspace=@pi9/whisper" >> "$GITHUB_OUTPUT"
              echo "path=packages/whisper" >> "$GITHUB_OUTPUT"
              echo "version=${GITHUB_REF_NAME#whisper-v}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unsupported release tag: $GITHUB_REF_NAME"
              exit 1
              ;;
          esac

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        env:
          PACKAGE_PATH: ${{ steps.package.outputs.path }}
          RELEASE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          PACKAGE_VERSION="$(node -p "require('./' + process.env.PACKAGE_PATH + '/package.json').version")"
          if [ "$RELEASE_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Release version ($RELEASE_VERSION) does not match package version ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Publish
        run: npm publish --workspace "${{ steps.package.outputs.workspace }}"
