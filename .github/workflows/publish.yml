name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag || github.event.release.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Update npm
        run: npm install -g npm@11

      - name: Select package from release tag
        id: package
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.release_tag || github.event.release.tag_name }}
        run: |
          case "$RELEASE_TAG" in
            ask-v*)
              echo "workspace=@pi9/ask" >> "$GITHUB_OUTPUT"
              echo "path=packages/ask" >> "$GITHUB_OUTPUT"
              echo "version=${RELEASE_TAG#ask-v}" >> "$GITHUB_OUTPUT"
              ;;
            context-v*)
              echo "workspace=@pi9/context" >> "$GITHUB_OUTPUT"
              echo "path=packages/context" >> "$GITHUB_OUTPUT"
              echo "version=${RELEASE_TAG#context-v}" >> "$GITHUB_OUTPUT"
              ;;
            subagent-v*)
              echo "workspace=@pi9/subagent" >> "$GITHUB_OUTPUT"
              echo "path=packages/subagent" >> "$GITHUB_OUTPUT"
              echo "version=${RELEASE_TAG#subagent-v}" >> "$GITHUB_OUTPUT"
              ;;
            todo-v*)
              echo "workspace=@pi9/todo" >> "$GITHUB_OUTPUT"
              echo "path=packages/todo" >> "$GITHUB_OUTPUT"
              echo "version=${RELEASE_TAG#todo-v}" >> "$GITHUB_OUTPUT"
              ;;
            whisper-v*)
              echo "workspace=@pi9/whisper" >> "$GITHUB_OUTPUT"
              echo "path=packages/whisper" >> "$GITHUB_OUTPUT"
              echo "version=${RELEASE_TAG#whisper-v}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unsupported release tag: $RELEASE_TAG"
              exit 1
              ;;
          esac

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        env:
          PACKAGE_PATH: ${{ steps.package.outputs.path }}
          RELEASE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          PACKAGE_VERSION="$(node -p "require('./' + process.env.PACKAGE_PATH + '/package.json').version")"
          if [ "$RELEASE_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Release version ($RELEASE_VERSION) does not match package version ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Check whether version is already published
        id: registry
        env:
          PACKAGE: ${{ steps.package.outputs.workspace }}
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          if npm view "$PACKAGE@$VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.registry.outputs.published != 'true'
        run: npm publish --workspace "${{ steps.package.outputs.workspace }}"
